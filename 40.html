<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>단어 퀴즈</title>
    <style>
      body {
        font-family: sans-serif;
        text-align: center;
        padding: 20px;
      }
      #options button {
        display: block;
        width: 220px;
        margin: 10px auto;
        padding: 10px;
        cursor: pointer;
      }
      .active {
        background-color: #4caf50;
        color: white;
      }
      .correct {
        background-color: #add8e6;
      }
      .wrong {
        background-color: #ffcccb;
      }
      #progress {
        margin-top: 20px;
        color: #666;
      }
      #wrongList {
        margin-top: 30px;
        text-align: left;
        max-width: 500px;
        margin-left: auto;
        margin-right: auto;
        background: #f5f5f5;
        padding: 15px;
        border-radius: 8px;
        display: none;
      }
    </style>
  </head>
  <body>
    <h2>단어 학습 퀴즈</h2>

    <div>
      <button id="modeMeaning" class="active">뜻 맞추기</button>
      <button id="modeListen">듣고 맞추기</button>
    </div>

    <hr />

    <h1 id="prompt">단어</h1>
    <button id="play" style="display: none">🔊 다시 듣기</button>

    <div id="options"></div>

    <div id="status"></div>
    <div id="progress"></div>

    <br />
    <button id="reset">처음부터 다시</button>
    <button id="next">건너뛰기</button>

    <div id="wrongList"></div>

    <script>
      const WORDS = [
        { en: "natural", ko: "자연스러운" },
        { en: "assumption", ko: "가정" },
        { en: "truth bias", ko: "진실 편향" },

        { en: "in other words", ko: "다시 말해" },
        { en: "automatic", ko: "자동적인" },

        { en: "usually", ko: "보통" },
        { en: "work out fine", ko: "잘 작동하다, 잘 해결되다" },

        { en: "for instance", ko: "예를 들어" },
        { en: "restroom", ko: "화장실" },
        { en: "be located", ko: "위치해 있다" },
        { en: "safely assume", ko: "안전하게 가정하다" },
        { en: "lie", ko: "거짓말하다" },
        { en: "response", ko: "대답, 응답" },

        { en: "imagine", ko: "상상하다" },
        { en: "converse with", ko: "~와 대화하다" },
        { en: "assume", ko: "가정하다" },
        { en: "false", ko: "거짓의" },

        { en: "indeed", ko: "실제로, 사실" },
        { en: "question", ko: "의심하다, 질문하다" },
        { en: "statement", ko: "진술, 말" },
        { en: "require", ko: "필요로 하다" },
        { en: "additional", ko: "추가적인" },
        { en: "mental step", ko: "정신적 단계" },

        { en: "cognitive miser", ko: "인지적 구두쇠" },
        { en: "typically", ko: "보통, 일반적으로" },
        { en: "expend", ko: "쓰다, 들이다" },
        { en: "mental effort", ko: "정신적 노력" },
        { en: "necessary", ko: "필요한" },
        { en: "given situation", ko: "주어진 상황" },

        { en: "make sense", ko: "말이 되다, 타당하다" },
        { en: "online", ko: "온라인에서" },
        { en: "even if", ko: "비록 ~일지라도" },
        { en: "fake", ko: "가짜의" },
        { en: "default", ko: "기본값, 기본 반응" },
        { en: "believe", ko: "믿다" },
        { en: "at least at first", ko: "적어도 처음에는" },

        { en: "doubt the truth", ko: "진실성을 의심하다" },
        { en: "receive information", ko: "정보를 받다" },
        { en: "due to", ko: "~때문에" },
        { en: "tendency", ko: "경향" },
        { en: "save mental effort", ko: "정신적 노력을 아끼다" },
      ];
      let mode = "meaning";
      let index = 0;
      let shuffled = [];
      let correctCount = 0;
      let answered = false;
      let wrongList = [];

      function shuffle(arr) {
        return arr.sort(() => Math.random() - 0.5);
      }

      function setMode(m) {
        mode = m;
        document
          .getElementById("modeMeaning")
          .classList.toggle("active", m === "meaning");
        document
          .getElementById("modeListen")
          .classList.toggle("active", m === "listen");
        document.getElementById("play").style.display =
          m === "listen" ? "inline-block" : "none";
        reset();
      }

      function reset() {
        shuffled = shuffle([...WORDS]);
        index = 0;
        correctCount = 0;
        answered = false;
        wrongList = [];
        document.getElementById("wrongList").style.display = "none";
        load();
      }

      function speak(text) {
        if (!window.speechSynthesis) return;
        const u = new SpeechSynthesisUtterance(text);
        u.lang = "en-US";
        speechSynthesis.cancel();
        speechSynthesis.speak(u);
      }

      function updateProgress() {
        const totalPlayed = index + (answered ? 1 : 0);
        const percent =
          totalPlayed === 0
            ? 0
            : Math.round((correctCount / totalPlayed) * 100);
        document.getElementById("progress").innerText = `${index + 1} / ${
          shuffled.length
        } | 정답 ${correctCount} | ${percent}%`;
      }

      function load() {
        const q = shuffled[index];
        answered = false;
        document.getElementById("status").innerText = "";
        document.getElementById("options").innerHTML = "";
        document.getElementById("prompt").innerText =
          mode === "meaning" ? q.en : "🔈 발음 듣고 맞추기";
        if (mode === "listen") speak(q.en);
        updateProgress();

        const choices = shuffle([
          q.ko,
          ...shuffle(WORDS.filter((w) => w.ko !== q.ko))
            .slice(0, 3)
            .map((w) => w.ko),
        ]);

        choices.forEach((c) => {
          const b = document.createElement("button");
          b.innerText = c;
          b.onclick = () => {
            if (answered) return;
            answered = true;

            if (c === q.ko) {
              b.classList.add("correct");
              correctCount++;
              document.getElementById("status").innerText = "정답!";
            } else {
              b.classList.add("wrong");
              document.getElementById("status").innerText =
                "오답! 정답: " + q.ko;

              wrongList.push({
                question: q.en,
                correct: q.ko,
                chosen: c,
              });
            }

            updateProgress();

            setTimeout(() => {
              if (index < shuffled.length - 1) {
                index++;
                load();
              } else {
                showWrongList();
              }
            }, 700);
          };

          document.getElementById("options").appendChild(b);
        });
      }

      function showWrongList() {
        const box = document.getElementById("wrongList");
        box.style.display = "block";

        if (wrongList.length === 0) {
          box.innerHTML = "<h3>🎉 전부 정답!</h3>";
          return;
        }

        let html = "<h3>❌ 오답 리스트</h3><ul>";
        wrongList.forEach((w) => {
          html += `<li>
            <strong>${w.question}</strong><br/>
            선택: ${w.chosen} → 정답: ${w.correct}
          </li><br/>`;
        });
        html += "</ul>";

        box.innerHTML = html;
      }

      document.getElementById("next").onclick = () => {
        if (index < shuffled.length - 1) {
          index++;
          load();
        }
      };

      document.getElementById("play").onclick = () => speak(shuffled[index].en);
      document.getElementById("modeMeaning").onclick = () => setMode("meaning");
      document.getElementById("modeListen").onclick = () => setMode("listen");
      document.getElementById("reset").onclick = reset;

      reset();
    </script>
  </body>
</html>
