<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>단어 퀴즈</title>
    <style>
      body {
        font-family: sans-serif;
        text-align: center;
        padding: 20px;
      }
      #options button {
        display: block;
        width: 220px;
        margin: 10px auto;
        padding: 10px;
        cursor: pointer;
      }
      .active {
        background-color: #4caf50;
        color: white;
      }
      .correct {
        background-color: #add8e6;
      }
      .wrong {
        background-color: #ffcccb;
      }
      #progress {
        margin-top: 20px;
        color: #666;
      }
      #wrongList {
        margin-top: 30px;
        text-align: left;
        max-width: 500px;
        margin-left: auto;
        margin-right: auto;
        background: #f5f5f5;
        padding: 15px;
        border-radius: 8px;
        display: none;
      }
    </style>
  </head>
  <body>
    <h2>단어 학습 퀴즈</h2>

    <div>
      <button id="modeMeaning" class="active">뜻 맞추기</button>
      <button id="modeListen">듣고 맞추기</button>
    </div>

    <hr />

    <h1 id="prompt">단어</h1>
    <button id="play" style="display: none">🔊 다시 듣기</button>

    <div id="options"></div>

    <div id="status"></div>
    <div id="progress"></div>

    <br />
    <button id="reset">처음부터 다시</button>
    <button id="next">건너뛰기</button>

    <div id="wrongList"></div>

    <script>
      const WORDS = [
        { en: "logical", ko: "논리적인" },
        { en: "objective", ko: "객관적인" },
        { en: "rational", ko: "이성적인" },
        { en: "therefore", ko: "그러므로, 그래서" },
        { en: "accurate", ko: "정확한" },
        { en: "analysis", ko: "분석" },
        { en: "judgment", ko: "판단" },
        { en: "decision", ko: "결정" },

        { en: "other people", ko: "다른 사람들" },
        { en: "agree with", ko: "~에 동의하다" },
        { en: "see what we see", ko: "우리가 보는 것을 보다" },

        { en: "opposite", ko: "반대" },
        { en: "the case", ko: "사실, 실제 상황" },

        { en: "every", ko: "모든" },
        { en: "human brain", ko: "인간의 뇌" },
        { en: "different", ko: "다른" },

        { en: "everyone's", ko: "모든 사람의" },
        { en: "life experience", ko: "삶의 경험" },
        { en: "desire", ko: "욕구, 바람" },
        { en: "knowledge", ko: "지식" },

        { en: "might think", ko: "생각할지도 모른다" },
        { en: "realistic", ko: "현실적인" },
        { en: "that is", ko: "즉, 다시 말해" },
        { en: "match reality", ko: "현실과 일치하다" },
        { en: "impossible", ko: "불가능한" },

        { en: "only", ko: "단지, 오직" },
        { en: "interpretation", ko: "해석" },
        { en: "reality", ko: "현실" },
        { en: "different from", ko: "~와 다른" },
        { en: "someone else's", ko: "다른 사람의 것" },

        { en: "nation", ko: "국가" },
        { en: "each other", ko: "서로" },
        { en: "fan", ko: "팬" },
        { en: "criticize", ko: "비난하다" },
        { en: "referee", ko: "심판" },
        { en: "miss", ko: "놓치다" },
        { en: "infraction", ko: "위반, 반칙" },
        { en: "commit", ko: "저지르다" },

        { en: "without fail", ko: "예외 없이, 반드시" },
        { en: "fan base", ko: "팬 집단" },
        { en: "believe that", ko: "~라고 믿다" },
        { en: "biased", ko: "편향된" },
        { en: "against", ko: "~에 반대하여, ~에게 불리하게" },

        { en: "open to interpretation", ko: "해석의 여지가 있는" },
      ];
      let mode = "meaning";
      let index = 0;
      let shuffled = [];
      let correctCount = 0;
      let answered = false;
      let wrongList = [];

      function shuffle(arr) {
        return arr.sort(() => Math.random() - 0.5);
      }

      function setMode(m) {
        mode = m;
        document
          .getElementById("modeMeaning")
          .classList.toggle("active", m === "meaning");
        document
          .getElementById("modeListen")
          .classList.toggle("active", m === "listen");
        document.getElementById("play").style.display =
          m === "listen" ? "inline-block" : "none";
        reset();
      }

      function reset() {
        shuffled = shuffle([...WORDS]);
        index = 0;
        correctCount = 0;
        answered = false;
        wrongList = [];
        document.getElementById("wrongList").style.display = "none";
        load();
      }

      function speak(text) {
        if (!window.speechSynthesis) return;
        const u = new SpeechSynthesisUtterance(text);
        u.lang = "en-US";
        speechSynthesis.cancel();
        speechSynthesis.speak(u);
      }

      function updateProgress() {
        const totalPlayed = index + (answered ? 1 : 0);
        const percent =
          totalPlayed === 0
            ? 0
            : Math.round((correctCount / totalPlayed) * 100);
        document.getElementById("progress").innerText = `${index + 1} / ${
          shuffled.length
        } | 정답 ${correctCount} | ${percent}%`;
      }

      function load() {
        const q = shuffled[index];
        answered = false;
        document.getElementById("status").innerText = "";
        document.getElementById("options").innerHTML = "";
        document.getElementById("prompt").innerText =
          mode === "meaning" ? q.en : "🔈 발음 듣고 맞추기";
        if (mode === "listen") speak(q.en);
        updateProgress();

        const choices = shuffle([
          q.ko,
          ...shuffle(WORDS.filter((w) => w.ko !== q.ko))
            .slice(0, 3)
            .map((w) => w.ko),
        ]);

        choices.forEach((c) => {
          const b = document.createElement("button");
          b.innerText = c;
          b.onclick = () => {
            if (answered) return;
            answered = true;

            if (c === q.ko) {
              b.classList.add("correct");
              correctCount++;
              document.getElementById("status").innerText = "정답!";
            } else {
              b.classList.add("wrong");
              document.getElementById("status").innerText =
                "오답! 정답: " + q.ko;

              wrongList.push({
                question: q.en,
                correct: q.ko,
                chosen: c,
              });
            }

            updateProgress();

            setTimeout(() => {
              if (index < shuffled.length - 1) {
                index++;
                load();
              } else {
                showWrongList();
              }
            }, 700);
          };

          document.getElementById("options").appendChild(b);
        });
      }

      function showWrongList() {
        const box = document.getElementById("wrongList");
        box.style.display = "block";

        if (wrongList.length === 0) {
          box.innerHTML = "<h3>🎉 전부 정답!</h3>";
          return;
        }

        let html = "<h3>❌ 오답 리스트</h3><ul>";
        wrongList.forEach((w) => {
          html += `<li>
            <strong>${w.question}</strong><br/>
            선택: ${w.chosen} → 정답: ${w.correct}
          </li><br/>`;
        });
        html += "</ul>";

        box.innerHTML = html;
      }

      document.getElementById("next").onclick = () => {
        if (index < shuffled.length - 1) {
          index++;
          load();
        }
      };

      document.getElementById("play").onclick = () => speak(shuffled[index].en);
      document.getElementById("modeMeaning").onclick = () => setMode("meaning");
      document.getElementById("modeListen").onclick = () => setMode("listen");
      document.getElementById("reset").onclick = reset;

      reset();
    </script>
  </body>
</html>
