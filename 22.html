<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>단어 퀴즈</title>
    <style>
      body {
        font-family: sans-serif;
        text-align: center;
        padding: 20px;
      }
      #options button {
        display: block;
        width: 220px;
        margin: 10px auto;
        padding: 10px;
        cursor: pointer;
      }
      .active {
        background-color: #4caf50;
        color: white;
      }
      .correct {
        background-color: #add8e6;
      }
      .wrong {
        background-color: #ffcccb;
      }
      #progress {
        margin-top: 20px;
        color: #666;
      }
      #wrongList {
        margin-top: 30px;
        text-align: left;
        max-width: 500px;
        margin-left: auto;
        margin-right: auto;
        background: #f5f5f5;
        padding: 15px;
        border-radius: 8px;
        display: none;
      }
    </style>
  </head>
  <body>
    <h2>단어 학습 퀴즈</h2>

    <div>
      <button id="modeMeaning" class="active">뜻 맞추기</button>
      <button id="modeListen">듣고 맞추기</button>
    </div>

    <hr />

    <h1 id="prompt">단어</h1>
    <button id="play" style="display: none">🔊 다시 듣기</button>

    <div id="options"></div>

    <div id="status"></div>
    <div id="progress"></div>

    <br />
    <button id="reset">처음부터 다시</button>
    <button id="next">건너뛰기</button>

    <div id="wrongList"></div>

    <script>
      const WORDS = [
        { en: "imagine", ko: "상상하다" },
        { en: "follow", ko: "따르다" },
        { en: "spirit", ko: "정신, 취지" },
        { en: "silence vow", ko: "침묵 서약" },
        { en: "daily life", ko: "일상생활" },

        { en: "challenge yourself", ko: "스스로에게 도전하다" },
        { en: "spend", ko: "보내다" },
        { en: "entire", ko: "전체의" },
        { en: "only", ko: "오직, ~만" },
        { en: "absolutely must", ko: "반드시 ~해야 한다" },

        { en: "widely observed", ko: "널리 관찰된" },
        { en: "behavioral psychology", ko: "행동심리학" },
        { en: "first date", ko: "첫 데이트" },
        { en: "tend to V", ko: "V하는 경향이 있다" },
        { en: "treat A as B", ko: "A를 B로 여기다" },
        { en: "turn to speak", ko: "말할 차례" },

        { en: "miss", ko: "놓치다" },
        { en: "mentally", ko: "마음속으로" },
        { en: "rehearse", ko: "연습하다" },
        { en: "utterance", ko: "발화, 말" },

        { en: "What if", ko: "~라면 어떨까?" },
        { en: "eliminate", ko: "제거하다, 없애다" },
        { en: "available", ko: "이용 가능한" },
        { en: "mini-silence", ko: "짧은 침묵" },
        { en: "opening", ko: "기회, 틈" },
        { en: "express", ko: "표현하다" },
        { en: "whatever", ko: "무엇이든" },

        { en: "be limited to", ko: "~로 제한되다" },
        { en: "say", ko: "가령, 예를 들어" },
        { en: "spoken words", ko: "말로 하는 단어들" },
        { en: "tomorrow", ko: "내일" },

        { en: "would", ko: "~할 것이다" },
        { en: "listen", ko: "듣다" },
        { en: "quite differently", ko: "꽤 다르게" },

        { en: "attend to", ko: "~에 주의를 기울이다" },
        { en: "carefully", ko: "주의 깊게" },
        { en: "every word", ko: "모든 말" },
        { en: "heard", ko: "들은" },

        { en: "be attuned to", ko: "~에 맞춰져 있다, 민감하다" },
        { en: "respond to", ko: "~에 반응하다, 답하다" },

        { en: "discover", ko: "발견하다" },
        { en: "the less, the more", ko: "~가 적을수록, 더 많이 ~하다" },
      ];
      let mode = "meaning";
      let index = 0;
      let shuffled = [];
      let correctCount = 0;
      let answered = false;
      let wrongList = [];

      function shuffle(arr) {
        return arr.sort(() => Math.random() - 0.5);
      }

      function setMode(m) {
        mode = m;
        document
          .getElementById("modeMeaning")
          .classList.toggle("active", m === "meaning");
        document
          .getElementById("modeListen")
          .classList.toggle("active", m === "listen");
        document.getElementById("play").style.display =
          m === "listen" ? "inline-block" : "none";
        reset();
      }

      function reset() {
        shuffled = shuffle([...WORDS]);
        index = 0;
        correctCount = 0;
        answered = false;
        wrongList = [];
        document.getElementById("wrongList").style.display = "none";
        load();
      }

      function speak(text) {
        if (!window.speechSynthesis) return;
        const u = new SpeechSynthesisUtterance(text);
        u.lang = "en-US";
        speechSynthesis.cancel();
        speechSynthesis.speak(u);
      }

      function updateProgress() {
        const totalPlayed = index + (answered ? 1 : 0);
        const percent =
          totalPlayed === 0
            ? 0
            : Math.round((correctCount / totalPlayed) * 100);
        document.getElementById("progress").innerText = `${index + 1} / ${
          shuffled.length
        } | 정답 ${correctCount} | ${percent}%`;
      }

      function load() {
        const q = shuffled[index];
        answered = false;
        document.getElementById("status").innerText = "";
        document.getElementById("options").innerHTML = "";
        document.getElementById("prompt").innerText =
          mode === "meaning" ? q.en : "🔈 발음 듣고 맞추기";
        if (mode === "listen") speak(q.en);
        updateProgress();

        const choices = shuffle([
          q.ko,
          ...shuffle(WORDS.filter((w) => w.ko !== q.ko))
            .slice(0, 3)
            .map((w) => w.ko),
        ]);

        choices.forEach((c) => {
          const b = document.createElement("button");
          b.innerText = c;
          b.onclick = () => {
            if (answered) return;
            answered = true;

            if (c === q.ko) {
              b.classList.add("correct");
              correctCount++;
              document.getElementById("status").innerText = "정답!";
            } else {
              b.classList.add("wrong");
              document.getElementById("status").innerText =
                "오답! 정답: " + q.ko;

              wrongList.push({
                question: q.en,
                correct: q.ko,
                chosen: c,
              });
            }

            updateProgress();

            setTimeout(() => {
              if (index < shuffled.length - 1) {
                index++;
                load();
              } else {
                showWrongList();
              }
            }, 700);
          };

          document.getElementById("options").appendChild(b);
        });
      }

      function showWrongList() {
        const box = document.getElementById("wrongList");
        box.style.display = "block";

        if (wrongList.length === 0) {
          box.innerHTML = "<h3>🎉 전부 정답!</h3>";
          return;
        }

        let html = "<h3>❌ 오답 리스트</h3><ul>";
        wrongList.forEach((w) => {
          html += `<li>
            <strong>${w.question}</strong><br/>
            선택: ${w.chosen} → 정답: ${w.correct}
          </li><br/>`;
        });
        html += "</ul>";

        box.innerHTML = html;
      }

      document.getElementById("next").onclick = () => {
        if (index < shuffled.length - 1) {
          index++;
          load();
        }
      };

      document.getElementById("play").onclick = () => speak(shuffled[index].en);
      document.getElementById("modeMeaning").onclick = () => setMode("meaning");
      document.getElementById("modeListen").onclick = () => setMode("listen");
      document.getElementById("reset").onclick = reset;

      reset();
    </script>
  </body>
</html>
