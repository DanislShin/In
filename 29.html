<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>단어 퀴즈</title>
    <style>
      body {
        font-family: sans-serif;
        text-align: center;
        padding: 20px;
      }
      #options button {
        display: block;
        width: 220px;
        margin: 10px auto;
        padding: 10px;
        cursor: pointer;
      }
      .active {
        background-color: #4caf50;
        color: white;
      }
      .correct {
        background-color: #add8e6;
      }
      .wrong {
        background-color: #ffcccb;
      }
      #progress {
        margin-top: 20px;
        color: #666;
      }
      #wrongList {
        margin-top: 30px;
        text-align: left;
        max-width: 500px;
        margin-left: auto;
        margin-right: auto;
        background: #f5f5f5;
        padding: 15px;
        border-radius: 8px;
        display: none;
      }
    </style>
  </head>
  <body>
    <h2>단어 학습 퀴즈</h2>

    <div>
      <button id="modeMeaning" class="active">뜻 맞추기</button>
      <button id="modeListen">듣고 맞추기</button>
    </div>

    <hr />

    <h1 id="prompt">단어</h1>
    <button id="play" style="display: none">🔊 다시 듣기</button>

    <div id="options"></div>

    <div id="status"></div>
    <div id="progress"></div>

    <br />
    <button id="reset">처음부터 다시</button>
    <button id="next">건너뛰기</button>

    <div id="wrongList"></div>

    <script>
      const WORDS = [
        { en: "study of experts", ko: "전문가들에 대한 연구" },
        { en: "provide insight", ko: "통찰을 제공하다" },
        { en: "what it means to V", ko: "V하는 것이 무엇을 의미하는지" },
        { en: "deep", ko: "깊은" },
        { en: "flexible understanding", ko: "유연한 이해" },

        { en: "expert", ko: "전문가" },
        { en: "particular domain", ko: "특정 분야" },
        { en: "richly", ko: "풍부하게" },
        { en: "interconnected", ko: "서로 연결된" },
        { en: "ideas about the world", ko: "세상에 대한 생각들" },

        { en: "not just", ko: "단지 ~만은 아닌" },
        { en: "good thinker", ko: "훌륭한 사고자" },
        { en: "exceptionally", ko: "예외적으로, 매우" },
        { en: "smart", ko: "똑똑한" },
      

        { en: "rather", ko: "오히려" },
        { en: "have knowledge", ko: "지식을 가지고 있다" },
        { en: "specific domain", ko: "특정 분야" },
        { en: "such as", ko: "~와 같은" },
        { en: "generalist", ko: "일반주의자" },

        { en: "however", ko: "하지만" },
        { en: "a bunch of facts", ko: "많은 사실들" },
        { en: "fact", ko: "사실" },

        { en: "expertise", ko: "전문성" },
        { en: "topic", ko: "주제" },
        { en: "be organized into", ko: "~로 조직되다" },
        { en: "coherent framework", ko: "일관성 있는 틀" },
        { en: "interrelationship", ko: "상호 관계" },
        { en: "distinguish", ko: "구별하다" },
        { en: "central", ko: "중심적인, 핵심적인" },

        { en: "this kind of", ko: "이런 종류의" },
        { en: "organized understanding", ko: "조직화된 이해" },
        { en: "allow for", ko: "~을 가능하게 하다" },
        { en: "flexibility", ko: "유연성" },
        { en: "facilitate", ko: "촉진하다, 쉽게 하다" },
        { en: "application", ko: "적용" },
        { en: "multiple contexts", ko: "여러 맥락" },
      ];
      let mode = "meaning";
      let index = 0;
      let shuffled = [];
      let correctCount = 0;
      let answered = false;
      let wrongList = [];

      function shuffle(arr) {
        return arr.sort(() => Math.random() - 0.5);
      }

      function setMode(m) {
        mode = m;
        document
          .getElementById("modeMeaning")
          .classList.toggle("active", m === "meaning");
        document
          .getElementById("modeListen")
          .classList.toggle("active", m === "listen");
        document.getElementById("play").style.display =
          m === "listen" ? "inline-block" : "none";
        reset();
      }

      function reset() {
        shuffled = shuffle([...WORDS]);
        index = 0;
        correctCount = 0;
        answered = false;
        wrongList = [];
        document.getElementById("wrongList").style.display = "none";
        load();
      }

      function speak(text) {
        if (!window.speechSynthesis) return;
        const u = new SpeechSynthesisUtterance(text);
        u.lang = "en-US";
        speechSynthesis.cancel();
        speechSynthesis.speak(u);
      }

      function updateProgress() {
        const totalPlayed = index + (answered ? 1 : 0);
        const percent =
          totalPlayed === 0
            ? 0
            : Math.round((correctCount / totalPlayed) * 100);
        document.getElementById("progress").innerText = `${index + 1} / ${
          shuffled.length
        } | 정답 ${correctCount} | ${percent}%`;
      }

      function load() {
        const q = shuffled[index];
        answered = false;
        document.getElementById("status").innerText = "";
        document.getElementById("options").innerHTML = "";
        document.getElementById("prompt").innerText =
          mode === "meaning" ? q.en : "🔈 발음 듣고 맞추기";
        if (mode === "listen") speak(q.en);
        updateProgress();

        const choices = shuffle([
          q.ko,
          ...shuffle(WORDS.filter((w) => w.ko !== q.ko))
            .slice(0, 3)
            .map((w) => w.ko),
        ]);

        choices.forEach((c) => {
          const b = document.createElement("button");
          b.innerText = c;
          b.onclick = () => {
            if (answered) return;
            answered = true;

            if (c === q.ko) {
              b.classList.add("correct");
              correctCount++;
              document.getElementById("status").innerText = "정답!";
            } else {
              b.classList.add("wrong");
              document.getElementById("status").innerText =
                "오답! 정답: " + q.ko;

              wrongList.push({
                question: q.en,
                correct: q.ko,
                chosen: c,
              });
            }

            updateProgress();

            setTimeout(() => {
              if (index < shuffled.length - 1) {
                index++;
                load();
              } else {
                showWrongList();
              }
            }, 700);
          };

          document.getElementById("options").appendChild(b);
        });
      }

      function showWrongList() {
        const box = document.getElementById("wrongList");
        box.style.display = "block";

        if (wrongList.length === 0) {
          box.innerHTML = "<h3>🎉 전부 정답!</h3>";
          return;
        }

        let html = "<h3>❌ 오답 리스트</h3><ul>";
        wrongList.forEach((w) => {
          html += `<li>
            <strong>${w.question}</strong><br/>
            선택: ${w.chosen} → 정답: ${w.correct}
          </li><br/>`;
        });
        html += "</ul>";

        box.innerHTML = html;
      }

      document.getElementById("next").onclick = () => {
        if (index < shuffled.length - 1) {
          index++;
          load();
        }
      };

      document.getElementById("play").onclick = () => speak(shuffled[index].en);
      document.getElementById("modeMeaning").onclick = () => setMode("meaning");
      document.getElementById("modeListen").onclick = () => setMode("listen");
      document.getElementById("reset").onclick = reset;

      reset();
    </script>
  </body>
</html>
