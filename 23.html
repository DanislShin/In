<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>단어 퀴즈</title>
    <style>
      body {
        font-family: sans-serif;
        text-align: center;
        padding: 20px;
      }
      #options button {
        display: block;
        width: 220px;
        margin: 10px auto;
        padding: 10px;
        cursor: pointer;
      }
      .active {
        background-color: #4caf50;
        color: white;
      }
      .correct {
        background-color: #add8e6;
      }
      .wrong {
        background-color: #ffcccb;
      }
      #progress {
        margin-top: 20px;
        color: #666;
      }
      #wrongList {
        margin-top: 30px;
        text-align: left;
        max-width: 500px;
        margin-left: auto;
        margin-right: auto;
        background: #f5f5f5;
        padding: 15px;
        border-radius: 8px;
        display: none;
      }
    </style>
  </head>
  <body>
    <h2>단어 학습 퀴즈</h2>

    <div>
      <button id="modeMeaning" class="active">뜻 맞추기</button>
      <button id="modeListen">듣고 맞추기</button>
    </div>

    <hr />

    <h1 id="prompt">단어</h1>
    <button id="play" style="display: none">🔊 다시 듣기</button>

    <div id="options"></div>

    <div id="status"></div>
    <div id="progress"></div>

    <br />
    <button id="reset">처음부터 다시</button>
    <button id="next">건너뛰기</button>

    <div id="wrongList"></div>

    <script>
      const WORDS = [
        { en: "science", ko: "과학" },
        { en: "be concerned with", ko: "~와 관련되다, ~에 관심을 두다" },
        { en: "accumulate", ko: "축적하다" },
        { en: "understand", ko: "이해하다" },
        { en: "observation", ko: "관찰" },
        { en: "physical world", ko: "물리적 세계" },

        { en: "that understanding", ko: "그 이해" },
        { en: "alone", ko: "그것만으로는" },
        { en: "solve", ko: "해결하다" },
        { en: "no problems", ko: "어떤 문제도" },

        { en: "individual people", ko: "개개인" },
        { en: "have to V", ko: "V해야 한다" },
        { en: "act on", ko: "~에 따라 행동하다, 실행에 옮기다" },
        { en: "help solve problems", ko: "문제 해결을 돕다" },

        { en: "for instance", ko: "예를 들어" },
       
        { en: "regular exercise", ko: "규칙적인 운동" },
        { en: "lower", ko: "낮추다" },
        { en: "risk", ko: "위험" },
        { en: "heart disease", ko: "심장병" },

     
        { en: "interesting", ko: "흥미로운" },
        { en: "personal health", ko: "개인 건강" },
        { en: "unless", ko: "~하지 않는다면" },
        { en: "actually", ko: "실제로" },

       
        { en: "article", ko: "글, 기사" },
     
    

        { en: "get into", ko: "~에 들어가다, 시작하다" },
        { en: "actual", ko: "실제의" },
        { en: "routine", ko: "일상적 습관, 루틴" },
        { en: "harder", ko: "더 어려운" },

        { en: "in this sense", ko: "이런 의미에서" },
        { en: "really", ko: "정말로, 실제로" },
       
        { en: "at all", ko: "전혀" },

        { en: "problem", ko: "문제" },
       
      

        { en: "in fact", ko: "사실" },
        { en: "humanity", ko: "인류" },
  
        { en: "be caused by", ko: "~에 의해 발생하다" },
        { en: "lack of action", ko: "행동 부족" },
        { en: "lack of knowledge", ko: "지식 부족" },
        { en: "not A but B", ko: "A가 아니라 B" },

        
        { en: "solving problems", ko: "문제를 해결하는 것" },
      ];
      let mode = "meaning";
      let index = 0;
      let shuffled = [];
      let correctCount = 0;
      let answered = false;
      let wrongList = [];

      function shuffle(arr) {
        return arr.sort(() => Math.random() - 0.5);
      }

      function setMode(m) {
        mode = m;
        document
          .getElementById("modeMeaning")
          .classList.toggle("active", m === "meaning");
        document
          .getElementById("modeListen")
          .classList.toggle("active", m === "listen");
        document.getElementById("play").style.display =
          m === "listen" ? "inline-block" : "none";
        reset();
      }

      function reset() {
        shuffled = shuffle([...WORDS]);
        index = 0;
        correctCount = 0;
        answered = false;
        wrongList = [];
        document.getElementById("wrongList").style.display = "none";
        load();
      }

      function speak(text) {
        if (!window.speechSynthesis) return;
        const u = new SpeechSynthesisUtterance(text);
        u.lang = "en-US";
        speechSynthesis.cancel();
        speechSynthesis.speak(u);
      }

      function updateProgress() {
        const totalPlayed = index + (answered ? 1 : 0);
        const percent =
          totalPlayed === 0
            ? 0
            : Math.round((correctCount / totalPlayed) * 100);
        document.getElementById("progress").innerText = `${index + 1} / ${
          shuffled.length
        } | 정답 ${correctCount} | ${percent}%`;
      }

      function load() {
        const q = shuffled[index];
        answered = false;
        document.getElementById("status").innerText = "";
        document.getElementById("options").innerHTML = "";
        document.getElementById("prompt").innerText =
          mode === "meaning" ? q.en : "🔈 발음 듣고 맞추기";
        if (mode === "listen") speak(q.en);
        updateProgress();

        const choices = shuffle([
          q.ko,
          ...shuffle(WORDS.filter((w) => w.ko !== q.ko))
            .slice(0, 3)
            .map((w) => w.ko),
        ]);

        choices.forEach((c) => {
          const b = document.createElement("button");
          b.innerText = c;
          b.onclick = () => {
            if (answered) return;
            answered = true;

            if (c === q.ko) {
              b.classList.add("correct");
              correctCount++;
              document.getElementById("status").innerText = "정답!";
            } else {
              b.classList.add("wrong");
              document.getElementById("status").innerText =
                "오답! 정답: " + q.ko;

              wrongList.push({
                question: q.en,
                correct: q.ko,
                chosen: c,
              });
            }

            updateProgress();

            setTimeout(() => {
              if (index < shuffled.length - 1) {
                index++;
                load();
              } else {
                showWrongList();
              }
            }, 700);
          };

          document.getElementById("options").appendChild(b);
        });
      }

      function showWrongList() {
        const box = document.getElementById("wrongList");
        box.style.display = "block";

        if (wrongList.length === 0) {
          box.innerHTML = "<h3>🎉 전부 정답!</h3>";
          return;
        }

        let html = "<h3>❌ 오답 리스트</h3><ul>";
        wrongList.forEach((w) => {
          html += `<li>
            <strong>${w.question}</strong><br/>
            선택: ${w.chosen} → 정답: ${w.correct}
          </li><br/>`;
        });
        html += "</ul>";

        box.innerHTML = html;
      }

      document.getElementById("next").onclick = () => {
        if (index < shuffled.length - 1) {
          index++;
          load();
        }
      };

      document.getElementById("play").onclick = () => speak(shuffled[index].en);
      document.getElementById("modeMeaning").onclick = () => setMode("meaning");
      document.getElementById("modeListen").onclick = () => setMode("listen");
      document.getElementById("reset").onclick = reset;

      reset();
    </script>
  </body>
</html>
